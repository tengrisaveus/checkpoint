name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: checkpoint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/checkpoint
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/checkpoint_test
      SECRET_KEY: test-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      TWITCH_CLIENT_ID: dummy
      TWITCH_CLIENT_SECRET: dummy

    steps:
      - uses: actions/checkout@v5


      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run auth tests
        working-directory: backend
        run: pytest test_api.py -v -k "register or login or test_me or test_invalid_status or test_invalid_rating or nonexistent"